name: FastMath Engine Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # CodeQL requires a cron schedule to scan for new zero-day vulnerabilities
    - cron: '0 12 * * 1'

jobs:
  lint-and-test:
    name: Ruff & Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-django pytest-playwright ruff

      - name: Code Quality (Ruff)
        run: ruff check .

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Boot Vue Server in Background
        run: |
          cd vue_client
          npm install
          npm run dev &
          sleep 5

      - name: E2E & Backend Testing (Pytest)
        run: pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings

  codeql-security-scan:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'javascript' ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"