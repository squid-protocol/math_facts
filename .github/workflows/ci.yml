name: Cross-Browser Progression Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install known backend libraries needed for the engine
        pip install pytest-playwright pytest-django django django-q pydantic better_profanity
        # Automatically install from requirements.txt if you have one
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .

    - name: Install Playwright Browsers
      run: playwright install --with-deps ${{ matrix.browser }}

    - name: Run Django Migrations
      run: python manage.py migrate

    - name: Execute End-to-End Tests
      run: pytest math_app/test_frontend.py --browser ${{ matrix.browser }}