<!-- FILE: templates/start.html -->
{% extends "layout.html" %}
{% block content %}
    <h2>Hi, {{ username }}!</h2>
    <p style="text-align: center; font-size: 1.2em;">
        You're about to start a 5-minute practice session.
        Answer as many questions as you can before the time runs out!
    </p>
    <div class="button-container">
        <button id="start-btn" class="button">Start 5-Minute Session</button>
    </div>

<script>
    document.getElementById('start-btn').addEventListener('click', () => {
        // Set the session end time in localStorage, 5 minutes from now
        const sessionDuration = 5 * 60 * 1000;
        const endTime = Date.now() + sessionDuration;
        localStorage.setItem('sessionEndTime', endTime);

        // Redirect to the practice page to begin
        window.location.href = "{{ url_for('practice', username=username) }}";
    });
</script>
{% endblock %}
